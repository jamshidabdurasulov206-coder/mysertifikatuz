version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: milliysertifikat-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-test_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
      POSTGRES_DB: ${DB_NAME:-test_app}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - m-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: milliysertifikat-app
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DB_USER=${DB_USER:-test_app}
      - DB_PASSWORD=${DB_PASSWORD:-1234}
      - DB_NAME=${DB_NAME:-test_app}
      - DB_HOST=db
      - DB_PORT=5432
      - JWT_SECRET=${JWT_SECRET}
      - PAYME_MERCHANT_ID=${PAYME_MERCHANT_ID}
      - PAYME_SECRET_KEY=${PAYME_SECRET_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - db
    networks:
      - m-network

volumes:
  pgdata:

networks:
  m-network:
    driver: bridge
